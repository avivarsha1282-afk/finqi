name: finiq
description: India's First AI Financial Mentor
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # HTTP Client
  dio: ^5.7.0

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  google_sign_in: ^6.2.2

  # Charts
  fl_chart: ^0.70.2

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Animations
  lottie: ^3.1.3
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # HTTP (for direct Gemini API)
  http: ^1.2.2

  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^6.1.1
  share_plus: ^10.1.2

  # UI
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  cloud_firestore: ^5.6.12
  flutter_markdown: ^0.7.7+1

  # Smart Buy Lens
  image_picker: ^1.1.2
  url_launcher: ^6.3.2
  permission_handler: ^11.3.1

  # Offline Caching
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.4
  json_serializable: ^6.8.0
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

